services:
  eggs-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eggs-server
    ports:
      - "${EGGS_SERVER_PORT:-8787}:8787"
    volumes:
      - ./data:/data
    command:
      - -addr
      - :8787
      - -data
      - /data
      - -base-url
      - ${EGGS_BASE_URL:-http://localhost:8787}
      - -public-by-default
      - ${EGGS_PUBLIC_BY_DEFAULT:-true}
    restart: unless-stopped
